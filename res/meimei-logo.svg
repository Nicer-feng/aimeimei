<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Meimei cat avatar">
  <defs>
    <clipPath id="avatarClip">
      <circle cx="64" cy="64" r="52"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#8A6D5A" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="36" fill="#FAF8F4"/>
  <circle cx="64" cy="64" r="56" fill="#E9AFC0" filter="url(#softShadow)"/>
  <image href="meimei-avatar.png" x="12" y="12" width="104" height="104" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
</svg>

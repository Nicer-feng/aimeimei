<svg xmlns="http://www.w3.org/2000/svg" width="360" height="96" viewBox="0 0 360 96" role="img" aria-labelledby="title desc">
  <title id="title">AI槑槑</title>
  <desc id="desc">槑槑猫咪头像和 AI槑槑品牌字样</desc>
  <defs>
    <clipPath id="avatarClip">
      <circle cx="48" cy="48" r="36"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#8A6D5A" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="360" height="96" rx="28" fill="#FAF8F4"/>
  <circle cx="48" cy="48" r="39" fill="#E9AFC0" filter="url(#softShadow)"/>
  <image href="meimei-avatar.png" x="12" y="12" width="72" height="72" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
  <text x="102" y="45" fill="#8A6D5A" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="25" font-weight="760">AI槑槑</text>
  <text x="102" y="70" fill="#D98FA8" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="650">你的家庭 AI 助手</text>
</svg>
